{% extends "movies/base.html" %}

{% block content %}
<div class="flex min-h-full justify-center py-10 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-lg rounded-xl border border-gray-200 bg-white/80 px-8 pt-6 pb-8 shadow-md backdrop-blur-sm dark:border-bordercol dark:bg-surface/60">
    <div class="mt-2 text-left text-3xl font-bold dark:text-white text-gray-500">
      Create your account
    </div>

    {% if errors %}
      <div class="mt-5 bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-4" role="alert">
        <p class="font-bold">Notice:</p>
        <ul class="mt-1 text-sm list-disc list-inside">
          {% for error in errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    <form class="px-2 pt-3 pb-4" role="form" method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next|default:'' }}" />

      <div class="block mt-3 text-gray-700 dark:text-slate-300">
        <input
          type="text"
          name="username"
          value="{{ username|default:'' }}"
          placeholder="Username"
          autocomplete="username"
          required
          class="block w-full rounded-lg border border-gray-300 bg-gray-100/80 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-500 transition-colors focus:border-green-600 focus:outline-none focus:ring-2 focus:ring-green-600/30 dark:border-bordercol dark:bg-[#141b23] dark:text-gray-100 dark:placeholder:text-gray-400 dark:focus:border-accent dark:focus:ring-accent/30"
        />
      </div>

      <div class="block mt-3 text-gray-700 dark:text-slate-300">
        <input
          type="email"
          name="email"
          value="{{ email|default:'' }}"
          placeholder="Email"
          autocomplete="email"
          class="block w-full rounded-lg border border-gray-300 bg-gray-100/80 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-500 transition-colors focus:border-green-600 focus:outline-none focus:ring-2 focus:ring-green-600/30 dark:border-bordercol dark:bg-[#141b23] dark:text-gray-100 dark:placeholder:text-gray-400 dark:focus:border-accent dark:focus:ring-accent/30"
        />
      </div>

      <div class="block mt-3 text-gray-700 dark:text-slate-300">
        <input
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="new-password"
          required
          class="block w-full rounded-lg border border-gray-300 bg-gray-100/80 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-500 transition-colors focus:border-green-600 focus:outline-none focus:ring-2 focus:ring-green-600/30 dark:border-bordercol dark:bg-[#141b23] dark:text-gray-100 dark:placeholder:text-gray-400 dark:focus:border-accent dark:focus:ring-accent/30"
        />
      </div>

      <div class="block mt-3 text-gray-700 dark:text-slate-300">
        <input
          type="password"
          name="password_confirm"
          placeholder="Confirm password"
          autocomplete="new-password"
          required
          class="block w-full rounded-lg border border-gray-300 bg-gray-100/80 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-500 transition-colors focus:border-green-600 focus:outline-none focus:ring-2 focus:ring-green-600/30 dark:border-bordercol dark:bg-[#141b23] dark:text-gray-100 dark:placeholder:text-gray-400 dark:focus:border-accent dark:focus:ring-accent/30"
        />
      </div>

      <div>
        <button type="submit" class="mt-6 text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 mr-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">
          Create account
        </button>
      </div>

      <div class="mt-4 font-medium text-gray-500 dark:text-slate-300">
        Already have an account?
        <a href="{% url 'login' %}{% if next %}?next={{ next|urlencode }}{% endif %}" class="mt-3 font-medium text-blue-600 dark:text-blue-500 hover:underline">Sign in</a>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
